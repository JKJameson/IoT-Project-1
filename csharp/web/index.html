<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Weather Nest — Rain Alert System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f5;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 20px 16px 40px;
      color: #1e2a3e;
    }

    .weather-app {
      max-width: 580px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 40px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      padding: 20px 20px 28px;
      transition: all 0.2s;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      column-gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e9edf2;
    }
    .app-header h1 {
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1f6e8c, #0e4e6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .header-title {
      display: flex;
      align-items: baseline;
      gap: 0;
      min-width: 0;
      flex-wrap: nowrap;
    }
    .header-right {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: 8px;
    }
    .update-badge {
      font-size: 0.7rem;
      background: #f0f4f9;
      padding: 6px 26px;
      border-radius: 60px;
      color: #2c5a6e;
      font-weight: 500;
    }
    .corner-day {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5f7385;
      font-weight: 700;
    }

    .today-card {
      background: linear-gradient(145deg, #1b3b4f, #0f2c3b);
      border-radius: 36px;
      padding: 22px 24px;
      margin: 16px 0 20px;
      color: white;
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.2);
    }
    .day-name {
      font-size: 1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
      margin-bottom: 8px;
    }
    .time-stamp {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 12px;
    }
.temp-big {
      font-size: 3.4rem;
      font-weight: 700;
      line-height: 1;
      margin: 0;
    }
    .temp-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .real-feel {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
    }
    .extra-details {
      margin-top: 12px;
      background: rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      padding: 10px 16px;
      border-radius: 48px;
      gap: 8px;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      text-align: center;
      flex: 1;
    }
.detail-label {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .sparkline-card {
      background: #f8fafd;
      border-radius: 28px;
      padding: 14px 16px;
      margin: 0 0 14px;
      border: 1px solid #eef2f8;
    }
    .sparkline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .sparkline-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5d7b8c;
    }
    .sparkline-range {
      font-size: 0.7rem;
      color: #6e8ea0;
      font-weight: 500;
    }
    #tempSparkline {
      width: 100%;
      height: 60px;
      display: block;
    }

    .device-panel {
      background: #eef3fc;
      border-radius: 28px;
      padding: 18px 20px;
      margin: 14px 0 18px;
    }
    .section-title {
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1b5a74;
      margin-bottom: 12px;
    }

    .alert-trigger {
      background: #fff6e5;
      border-radius: 24px;
      padding: 12px 14px;
      font-size: 0.8rem;
      border-left: 4px solid #f4b942;
      margin-top: 8px;
    }
    .rain-notification {
      background: #e0f2fe;
      border-left: 4px solid #0284c7;
      margin-top: 12px;
    }

    .rain-section {
      margin: 20px 0 16px;
    }
    .rain-badge-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: #f1f5f9;
      border-radius: 48px;
      padding: 12px 18px;
    }
    .rain-label {
      font-weight: 700;
      font-size: 1rem;
    }
    .rain-percent-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .rain-percent {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1e6f5c;
    }
    .rain-percent-sub {
      font-size: 0.6rem;
      font-weight: 500;
      color: #8a9fae;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: -2px;
    }



    .notification-banner {
      position: fixed;
      top: 20px;
      right: 20px;
      max-width: 350px;
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
      border-left: 4px solid;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .notification-banner.rain-start {
      border-left-color: #0284c7;
      background: #e0f2fe;
    }
    .notification-banner.rain-stop {
      border-left-color: #f59e0b;
      background: #fef3c7;
    }
  </style>
</head>
<body>
<div class="weather-app">
  <div class="app-header">
    <div class="header-title">
      <h1>🌤️ Weather Nest</h1>
    </div>
    <div class="header-right">
      <div class="corner-day" id="todayDayName">Tuesday, Apr 23</div>
      <div class="update-badge" id="liveTimestamp">Updating...</div>
    </div>
  </div>

  <div class="rain-section">
    <div class="rain-badge-row">
      <span class="rain-label" id="rainStatusLabel">🌧️ Chance of Rain</span>
      <div class="rain-percent-wrap">
        <span class="rain-percent" id="rainPercentDisplay">0%</span>
        <span class="rain-percent-sub" id="rainPercentSub">chance of rain</span>
      </div>
    </div>
    <div class="sun-times" id="sunTimesRow">🌅 Sunrise … • 🌇 Sunset …</div>
  </div>

  <div class="today-card">
    <div class="temp-row">
      <div class="temp-big">
        <span id="bigTemp">--</span><span>°</span>
      </div>
       <div class="real-feel">
         <span>Feels like <strong id="realFeelVal">--</strong>°</span>
       </div>
    </div>
    <div class="extra-details">
      <div class="detail-item"><span class="detail-label">📊 Pressure</span><span class="detail-value" id="pressureVal">-- hPa</span></div>
      <div class="detail-item"><span class="detail-label">💧 Humidity</span><span class="detail-value" id="humidityVal">--%</span></div>
      <div class="detail-item"><span class="detail-label">🌫️ Dew Point</span><span class="detail-value" id="dewPointVal">--°C</span></div>
    </div>
  </div>

  <div class="sparkline-card">
    <div class="sparkline-header">
      <span class="sparkline-title">📈 Temperature (7 days)</span>
      <span class="sparkline-range" id="tempRange">-- - --°C</span>
    </div>
    <canvas id="tempSparkline" width="440" height="60"></canvas>
  </div>

  <div class="device-panel">
    <div class="section-title" id="alertsSectionTitle">🔕 Rain Alerts</div>
    <div class="alert-trigger rain-notification" id="rainAlertMsg">
      🛑 Rain alerts off — toggle to enable notifications
    </div>
    <div class="alert-trigger" style="margin-top:8px; text-align:center;">
      <button id="alertsToggleBtn" onclick="toggleAlerts()" style="background:#e5e7eb; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; font-size:0.8rem; color:#6b7280;">Enable alerts ⏻</button>
    </div>
  </div>


</div>

<script>
  // Rain state tracking
  let isRaining = false;
  let lastNotificationTime = 0;
  const NOTIFICATION_COOLDOWN = 300000; // 5 minutes cooldown between same type notifications

  // Safe DOM element getter with null check
  function safeGetElement(id) {
    const element = document.getElementById(id);
    if (!element) {
      console.warn(`Element with id "${id}" not found`);
    }
    return element;
  }

  // Safe innerHTML setter
  function safeSetHTML(id, value) {
    const element = safeGetElement(id);
    if (element) {
      element.innerHTML = value;
    }
  }

  // Helper function to get pressure trend display
  function getPressureTrendDisplay(trend) {
    if (trend === null || trend === undefined || trend === 0) {
      return { value: '0.00', direction: '→ Stable', arrow: '→' };
    }
    
    let direction = '';
    let arrow = '';
    
    if (trend < -2) {
      arrow = '▼▼';
      direction = 'Falling Fast';
    } else if (trend < -0.5) {
      arrow = '▼';
      direction = 'Falling';
    } else if (trend > 2) {
      arrow = '▲▲';
      direction = 'Rising Fast';
    } else if (trend > 0.5) {
      arrow = '▲';
      direction = 'Rising';
    } else if (trend > 0.1) {
      arrow = '↗';
      direction = 'Rising Slowly';
    } else if (trend < -0.1) {
      arrow = '↘';
      direction = 'Falling Slowly';
    } else {
      arrow = '→';
      direction = 'Stable';
    }
    
    return { 
      value: Math.abs(trend).toFixed(2), 
      direction: `${arrow} ${direction}`,
      arrow: arrow
    };
  }
  
  // Helper: Show notification popup
  function showNotification(title, message, type) {
    // Remove existing notification
    const existingNotif = document.querySelector('.notification-banner');
    if (existingNotif) existingNotif.remove();
    
    // Create notification element
    const notif = document.createElement('div');
    notif.className = `notification-banner ${type === 'start' ? 'rain-start' : 'rain-stop'}`;
    notif.innerHTML = `
      <strong style="display: block; margin-bottom: 5px;">${title}</strong>
      <span style="font-size: 0.9rem;">${message}</span>
      <small style="display: block; margin-top: 8px; opacity: 0.7;">${new Date().toLocaleTimeString()}</small>
    `;
    document.body.appendChild(notif);
    
    // Auto remove after 8 seconds
    setTimeout(() => {
      if (notif && notif.remove) notif.remove();
    }, 8000);
    
    // Also show browser notification if permitted
    if (Notification.permission === 'granted') {
      new Notification(title, { body: message, icon: type === 'start' ? '🌧️' : '☀️' });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission();
    }
  }
   
  // Main rain detection logic
  function checkRainChange(rainLabel) {
    const now = Date.now();
    const isCurrentlyRaining = rainLabel && !rainLabel.toLowerCase().includes('no') && 
                               (rainLabel.toLowerCase().includes('rain') || rainLabel === 'Light' || rainLabel === 'Moderate' || rainLabel === 'Heavy');
    
    if (isCurrentlyRaining && !isRaining) {
      isRaining = true;
      
      const alertDiv = safeGetElement('rainAlertMsg');
      if (alertDiv) {
        alertDiv.innerHTML = `🌧️ RAIN STARTED (${rainLabel}) — ${new Date().toLocaleTimeString()}`;
        alertDiv.style.background = "#dbeafe";
        alertDiv.style.borderLeftColor = "#0284c7";
      }
    }
    else if (!isCurrentlyRaining && isRaining) {
      isRaining = false;
      
      const alertDiv = safeGetElement('rainAlertMsg');
      if (alertDiv) {
        alertDiv.innerHTML = `☀️ Rain stopped — ${new Date().toLocaleTimeString()}`;
        alertDiv.style.background = "#fef3c7";
        alertDiv.style.borderLeftColor = "#f59e0b";
      }
      
      if (now - lastNotificationTime > NOTIFICATION_COOLDOWN) {
        lastNotificationTime = now;
        
        showNotification(
          '☀️ Rain Stopped', 
          'Rain has ended. Weather is clearing up!',
          'stop'
        );
      }
    }
  }
  
  // Format temperature
  function formatTemp(celsius) {
    if (celsius === null || celsius === undefined) return '--';
    return Math.round(celsius * 10) / 10;
  }

  // Dew point from temp and humidity
  function calcDewPoint(tempC, humidity) {
    if (tempC === null || humidity === null) return null;
    const a = 17.27;
    const b = 237.7;
    const gamma = (a * tempC) / (b + tempC) + Math.log(humidity / 100);
    return (b * gamma) / (a - gamma);
  }

  // Draw temperature sparkline
  function drawSparkline() {
    fetch('/api/temperature-history')
      .then(r => r.json())
      .then(data => {
        if (!data || data.length === 0) return;

        const canvas = document.getElementById('tempSparkline');
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;

        // Downsample to ~100 points for sparkline
        const step = Math.max(1, Math.floor(data.length / 100));
        const points = data.filter((_, i) => i % step === 0);

        if (points.length < 2) return;

        const temps = points.map(p => p.tempC);
        const min = Math.min(...temps);
        const max = Math.max(...temps);
        const range = max - min || 1;

        // Update range display
        safeSetHTML('tempRange', `${formatTemp(min)} - ${formatTemp(max)}°C`);

        // Clear canvas
        ctx.clearRect(0, 0, w, h);

        // Draw gradient fill
        const gradient = ctx.createLinearGradient(0, 0, 0, h);
        gradient.addColorStop(0, 'rgba(30, 111, 92, 0.3)');
        gradient.addColorStop(1, 'rgba(30, 111, 92, 0.0)');

        const pad = 4;
        const xStep = (w - pad * 2) / (points.length - 1);

        ctx.beginPath();
        ctx.moveTo(pad + xStep * 0, h - pad - ((points[0].tempC - min) / range) * (h - pad * 2));
        points.forEach((p, i) => {
          const x = pad + xStep * i;
          const y = h - pad - ((p.tempC - min) / range) * (h - pad * 2);
          ctx.lineTo(x, y);
        });
        ctx.lineTo(pad + xStep * (points.length - 1), h);
        ctx.lineTo(pad, h);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        // Draw line
        ctx.beginPath();
        ctx.moveTo(pad + xStep * 0, h - pad - ((points[0].tempC - min) / range) * (h - pad * 2));
        points.forEach((p, i) => {
          const x = pad + xStep * i;
          const y = h - pad - ((p.tempC - min) / range) * (h - pad * 2);
          ctx.lineTo(x, y);
        });
        ctx.strokeStyle = '#1e6f5c';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      })
      .catch(() => {});
  }

  // Test Telegram bot
  function testTelegram() {
    fetch('/api/test-telegram')
      .then(r => r.json())
      .then(d => {
        const msg = safeGetElement('rainAlertMsg');
        if (msg) {
          msg.innerHTML = d.ok ? '✅ Telegram test sent!' : '⚠️ Telegram failed: ' + (d.error || 'unknown');
          msg.style.background = d.ok ? "#dbeafe" : "#fee";
        }
      })
      .catch(() => {
        const msg = safeGetElement('rainAlertMsg');
        if (msg) {
          msg.innerHTML = '⚠️ Telegram not available';
          msg.style.background = "#fee";
        }
      });
  }

  // Toggle alerts on/off
  async function toggleAlerts() {
    const btn = safeGetElement('alertsToggleBtn');
    const msg = safeGetElement('rainAlertMsg');
    try {
      const resp = await fetch('/api/alerts-toggle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: btn.textContent.includes('Enable') })
      });
      const data = await resp.json();
      updateAlertsUI(data.enabled);
    } catch (e) {
      console.warn('Toggle failed', e);
    }
  }

  function updateAlertsUI(enabled) {
    const btn = safeGetElement('alertsToggleBtn');
    const msg = safeGetElement('rainAlertMsg');
    const title = safeGetElement('alertsSectionTitle');
    if (!btn || !msg) return;
    if (enabled) {
      btn.textContent = '⏻ Alerts enabled';
      btn.style.background = '#dbeafe';
      btn.style.color = '#0284c7';
      msg.innerHTML = '✅ Rain alerts are ON — you will be notified when rain stops';
      msg.style.background = '#dbeafe';
      msg.style.borderLeftColor = '#0284c7';
      if (title) title.innerHTML = '🔔 Rain Alerts';
    } else {
      btn.textContent = 'Enable alerts ⏻';
      btn.style.background = '#e5e7eb';
      btn.style.color = '#6b7280';
      msg.innerHTML = '🛑 Rain alerts off — toggle to enable notifications';
      msg.style.background = '#fef3c7';
      msg.style.borderLeftColor = '#f59e0b';
      if (title) title.innerHTML = '🔕 Rain Alerts';
    }
  }

  // Fetch initial alerts state
  function loadAlertsState() {
    fetch('/api/alerts-state')
      .then(r => r.json())
      .then(d => updateAlertsUI(d.enabled))
      .catch(() => {});
  }
  
   // Update rain tags display — removed, sensor detail shown inline
  
  // Main refresh function
  function refreshDashboard() {
    fetch('/api/sensors')
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(data => {
        const tempC = (data.temperatureC !== undefined && data.temperatureC !== null) ? data.temperatureC : null;
        const humidityRaw = (data.humidity !== undefined && data.humidity !== null) ? data.humidity : null;
        const pressureHpa = (data.pressureHpa !== undefined && data.pressureHpa !== null) ? data.pressureHpa : null;

        const rainLabelRaw = data.rainLabel || 'No rain';
        const updatedAtRaw = data.updatedAt ? new Date(data.updatedAt) : new Date();
        const pressureTrend = data.pressureTrendHpaPerHour !== undefined ? data.pressureTrendHpaPerHour : null;
        const sunriseLocal = data.sunriseLocal || '--:--';
        const sunsetLocal = data.sunsetLocal || '--:--';

        checkRainChange(rainLabelRaw);
        
        // Update UI - RealFeel calculation
        let realFeel = tempC;
        if (tempC !== null && humidityRaw !== null) {
          if (humidityRaw > 70 && tempC > 20) {
            realFeel = tempC + 1.5;
          } else if (tempC < 10) {
            realFeel = tempC - 1.2;
          } else {
            realFeel = tempC;
          }
          realFeel = Math.round(realFeel * 10) / 10;
        }
        
        // Pressure trend display (calculated from actual pressure changes)
        const trendDisplay = getPressureTrendDisplay(pressureTrend);
        
        const formattedTime = updatedAtRaw.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
        safeSetHTML('liveTimestamp', `🕒 ${formattedTime}`);
        
        const today = new Date();
        const weekdayName = today.toLocaleDateString(undefined, { weekday: 'long' });
        const shortDate = today.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        safeSetHTML('todayDayName', `${weekdayName}, ${shortDate}`);

        // Temperature and RealFeel
        if (tempC !== null) {
          safeSetHTML('bigTemp', formatTemp(tempC));
          safeSetHTML('realFeelVal', (realFeel !== null) ? realFeel : formatTemp(tempC));
        } else {
          safeSetHTML('bigTemp', '--');
          safeSetHTML('realFeelVal', '--');
        }
        
        // Pressure and Humidity
        safeSetHTML('pressureVal', (pressureHpa !== null) ? `${pressureHpa} hPa` : '-- hPa');
        safeSetHTML('humidityVal', (humidityRaw !== null) ? `${humidityRaw}%` : '--%');

        // Dew point — calculated client-side
        const dewPoint = calcDewPoint(tempC, humidityRaw);
        if (dewPoint !== null) {
          safeSetHTML('dewPointVal', `${formatTemp(dewPoint)}°C`);
        } else {
          safeSetHTML('dewPointVal', '--°C');
        }
        
        // Rain status — sensor-based
        safeSetHTML('rainStatusLabel', `🌧️ ${rainLabelRaw}`);
        safeSetHTML('rainPercentDisplay', '');
        safeSetHTML('rainPercentSub', '');
        safeSetHTML('sunTimesRow', `🌅 Sunrise ${sunriseLocal} • 🌇 Sunset ${sunsetLocal}`);
      })
      .catch(error => {
        console.warn("Fetch error", error);
        safeSetHTML('liveTimestamp', '⚠️ connection lost');
      });
  }
  
  // Initial call and interval (2 seconds)
  refreshDashboard();
  setInterval(refreshDashboard, 2000);
  drawSparkline();
  setInterval(drawSparkline, 60000);
  loadAlertsState();
</script>
</body>
</html>
