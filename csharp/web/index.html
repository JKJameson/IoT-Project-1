<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Weather Nest — Rain Alert System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f5;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 20px 16px 40px;
      color: #1e2a3e;
    }

    .weather-app {
      max-width: 580px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 40px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      padding: 20px 20px 28px;
      transition: all 0.2s;
    }

    .app-header {
      display: flex;
      justify-content: flex-start;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e9edf2;
    }
    .app-header h1 {
      font-size: 1.7rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1f6e8c, #0e4e6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .header-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }
    .update-badge {
      font-size: 0.7rem;
      background: #f0f4f9;
      padding: 6px 12px;
      border-radius: 60px;
      color: #2c5a6e;
      font-weight: 500;
    }
    .corner-day {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5f7385;
      font-weight: 700;
    }

    .today-card {
      background: linear-gradient(145deg, #1b3b4f, #0f2c3b);
      border-radius: 36px;
      padding: 22px 24px;
      margin: 16px 0 20px;
      color: white;
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.2);
    }
    .day-name {
      font-size: 1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
      margin-bottom: 8px;
    }
    .time-stamp {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 12px;
    }
    .temp-big {
      font-size: 3.4rem;
      font-weight: 700;
      line-height: 1;
      margin: 8px 0 8px;
    }
    .temp-big span {
      font-size: 1.8rem;
      font-weight: 500;
    }
    .real-feel {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 12px;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.12);
      border-radius: 48px;
      padding: 10px 16px;
      backdrop-filter: blur(2px);
    }
    .extra-details {
      margin-top: 12px;
      background: rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      padding: 10px 16px;
      border-radius: 48px;
      gap: 8px;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      text-align: center;
      flex: 1;
    }
    .detail-label {
      font-size: 0.7rem;
      opacity: 0.7;
    }
    .detail-value {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .device-panel {
      background: #eef3fc;
      border-radius: 28px;
      padding: 18px 20px;
      margin: 14px 0 18px;
    }
    .section-title {
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1b5a74;
      margin-bottom: 12px;
    }

    .alert-trigger {
      background: #fff6e5;
      border-radius: 24px;
      padding: 12px 14px;
      font-size: 0.8rem;
      border-left: 4px solid #f4b942;
      margin-top: 8px;
    }
    .rain-notification {
      background: #e0f2fe;
      border-left: 4px solid #0284c7;
      margin-top: 12px;
    }

    .rain-section {
      margin: 20px 0 16px;
    }
    .rain-badge-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: #f1f5f9;
      border-radius: 48px;
      padding: 12px 18px;
    }
    .rain-label {
      font-weight: 700;
      font-size: 1rem;
    }
    .rain-percent {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1e6f5c;
    }
    .rain-tags {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      color: #567d95;
      font-size: 0.8rem;
    }
    .tag {
      background: #eef2f5;
      padding: 5px 12px;
      border-radius: 50px;
    }

    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 22px;
      color: #8da3b2;
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
    }
    .notification-banner {
      position: fixed;
      top: 20px;
      right: 20px;
      max-width: 350px;
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
      border-left: 4px solid;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .notification-banner.rain-start {
      border-left-color: #0284c7;
      background: #e0f2fe;
    }
    .notification-banner.rain-stop {
      border-left-color: #f59e0b;
      background: #fef3c7;
    }
  </style>
</head>
<body>
<div class="weather-app">
  <div class="app-header">
    <div class="header-title">
      <h1>🌤️ Weather Nest</h1>
      <div class="corner-day" id="todayDayName">Tuesday, Apr 23</div>
      <div class="update-badge" id="liveTimestamp">Updating...</div>
    </div>
  </div>

  <div class="rain-section">
    <div class="rain-badge-row">
      <span class="rain-label">🌧️ Chance of Rain</span>
      <span class="rain-percent" id="rainPercentDisplay">0%</span>
    </div>
    <div class="rain-tags">
      <span class="tag" id="rainTagRainy">🌧️ Rainy</span>
      <span class="tag" id="rainTagSunny">☀️ Sunny</span>
      <span class="tag" id="rainTagHeavy">⛈️ Heavy</span>
    </div>
  </div>

  <div class="today-card">
    <div class="temp-big">
      <span id="bigTemp">--</span><span>°</span>
    </div>
    <div class="real-feel">
      <span>🌡️ RealFeel <strong id="realFeelVal">--</strong>°</span>
    </div>
    <div class="extra-details">
      <div class="detail-item"><span class="detail-label">📊 Pressure</span><span class="detail-value" id="pressureVal">-- hPa</span></div>
      <div class="detail-item"><span class="detail-label">💧 Humidity</span><span class="detail-value" id="humidityVal">--%</span></div>
      <div class="detail-item"><span class="detail-label">🌫️ Dew Point</span><span class="detail-value" id="dewPointVal">--°C</span></div>
    </div>
  </div>

  <div class="device-panel">
    <div class="section-title">🌧️ Rain Alerts</div>
    <div class="alert-trigger rain-notification" id="rainAlertMsg">
      🌧️ Rain monitor active: Will notify when rain starts or stops
    </div>
  </div>

  <div class="footer-note" id="systemMessage">
    ✅ Live rain detection • auto-refresh every 2s
  </div>
</div>

<script>
  // Safe DOM element getter with null check
  function safeGetElement(id) {
    const element = document.getElementById(id);
    if (!element) {
      console.warn(`Element with id "${id}" not found`);
    }
    return element;
  }

  // Safe innerHTML setter
  function safeSetHTML(id, value) {
    const element = safeGetElement(id);
    if (element) {
      element.innerHTML = value;
    }
  }

  // Helper function to get pressure trend display
  function getPressureTrendDisplay(trend) {
    if (trend === null || trend === undefined || trend === 0) {
      return { value: '0.00', direction: '→ Stable', arrow: '→' };
    }
    
    let direction = '';
    let arrow = '';
    
    if (trend < -2) {
      arrow = '▼▼';
      direction = 'Falling Fast';
    } else if (trend < -0.5) {
      arrow = '▼';
      direction = 'Falling';
    } else if (trend > 2) {
      arrow = '▲▲';
      direction = 'Rising Fast';
    } else if (trend > 0.5) {
      arrow = '▲';
      direction = 'Rising';
    } else if (trend > 0.1) {
      arrow = '↗';
      direction = 'Rising Slowly';
    } else if (trend < -0.1) {
      arrow = '↘';
      direction = 'Falling Slowly';
    } else {
      arrow = '→';
      direction = 'Stable';
    }
    
    return { 
      value: Math.abs(trend).toFixed(2), 
      direction: `${arrow} ${direction}`,
      arrow: arrow
    };
  }
  
// Helper: Show browser notification
  function showBrowserNotification(title, message, type) {
    if (Notification.permission === 'granted') {
      new Notification(title, { body: message, icon: type === 'start' ? '🌧️' : '☀️' });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission();
    }
  }

  // Format temperature
  function formatTemp(celsius) {
    if (celsius === null || celsius === undefined) return '--';
    return Math.round(celsius * 10) / 10;
  }
  
  // Update rain tags display
  function updateRainTags(rainLabel, confidence) {
    const rainyTag = safeGetElement('rainTagRainy');
    const sunnyTag = safeGetElement('rainTagSunny');
    const heavyTag = safeGetElement('rainTagHeavy');
    if (!rainyTag || !sunnyTag || !heavyTag) return;
    
    const labelLower = (rainLabel || '').toLowerCase();
    const isRainy = labelLower.includes('rain') || (confidence > 30 && !labelLower.includes('no'));
    const isHeavy = labelLower.includes('heavy') || (confidence > 70 && labelLower.includes('rain'));
    const isSunny = labelLower.includes('no rain') || (confidence < 20 && !isRainy);
    
    [rainyTag, sunnyTag, heavyTag].forEach(t => { t.style.opacity = '0.5'; t.style.fontWeight = 'normal'; });
    if (isHeavy) {
      heavyTag.style.opacity = '1';
      heavyTag.style.fontWeight = 'bold';
    } else if (isRainy) {
      rainyTag.style.opacity = '1';
      rainyTag.style.fontWeight = 'bold';
    } else if (isSunny) {
      sunnyTag.style.opacity = '1';
      sunnyTag.style.fontWeight = 'bold';
    } else {
      rainyTag.style.opacity = '0.8';
    }
  }
  
  // Main refresh function
  function refreshDashboard() {
    fetch('/api/sensors')
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(data => {
        const tempC = (data.temperatureC !== undefined && data.temperatureC !== null) ? data.temperatureC : null;
        const humidityRaw = (data.humidity !== undefined && data.humidity !== null) ? data.humidity : null;
        const pressureHpa = (data.pressureHpa !== undefined && data.pressureHpa !== null) ? data.pressureHpa : null;
        const dewPoint = (data.dewPointC !== undefined && data.dewPointC !== null) ? data.dewPointC : null;
        const rainLabelRaw = data.rainLabel || (data.rainConfidence !== undefined ? (data.rainConfidence > 30 ? 'Rain possible' : 'No rain') : 'No rain');
        const rainConfidence = (data.rainConfidence !== undefined && data.rainConfidence !== null) ? data.rainConfidence : 0;
        const updatedAtRaw = data.updatedAt ? new Date(data.updatedAt) : new Date();
        const pressureTrend = data.pressureTrendHpaPerHour !== undefined ? data.pressureTrendHpaPerHour : null;

        // Update rain alert from server
        const rainAlertMsg = safeGetElement('rainAlertMsg');
        if (rainAlertMsg) {
          rainAlertMsg.innerHTML = data.rainAlertMessage || '🌧️ Rain monitor active: Will notify when rain starts or stops';
          if (data.isRaining) {
            rainAlertMsg.style.background = "#dbeafe";
            rainAlertMsg.style.borderLeftColor = "#0284c7";
          } else {
            rainAlertMsg.style.background = "#fff6e5";
            rainAlertMsg.style.borderLeftColor = "#f4b942";
          }
        }

        // Show browser notification on state change
        const wasRaining = window._wasRaining;
        if (wasRaining !== undefined && wasRaining !== data.isRaining) {
          if (data.isRaining) {
            showBrowserNotification('🌧️ Rain Started!', `Rain detected. Take precautions!`, 'start');
          } else {
            showBrowserNotification('☀️ Rain Stopped', 'Weather is clearing up.', 'stop');
          }
        }
        window._wasRaining = data.isRaining;

        // Update UI - RealFeel calculation
        let realFeel = tempC;
        if (tempC !== null && humidityRaw !== null) {
          if (humidityRaw > 70 && tempC > 20) {
            realFeel = tempC + 1.5;
          } else if (tempC < 10) {
            realFeel = tempC - 1.2;
          } else {
            realFeel = tempC;
          }
          realFeel = Math.round(realFeel * 10) / 10;
        }
        
        // Pressure trend display (calculated from actual pressure changes)
        const trendDisplay = getPressureTrendDisplay(pressureTrend);
        
        const formattedTime = updatedAtRaw.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
        safeSetHTML('liveTimestamp', `🕒 ${formattedTime}`);
        
        const today = new Date();
        const weekdayName = today.toLocaleDateString(undefined, { weekday: 'long' });
        const shortDate = today.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        safeSetHTML('todayDayName', `${weekdayName}, ${shortDate}`);

        // Temperature and RealFeel
        if (tempC !== null) {
          safeSetHTML('bigTemp', formatTemp(tempC));
          safeSetHTML('realFeelVal', (realFeel !== null) ? realFeel : formatTemp(tempC));
        } else {
          safeSetHTML('bigTemp', '--');
          safeSetHTML('realFeelVal', '--');
        }
        
        // Pressure and Humidity
        safeSetHTML('pressureVal', (pressureHpa !== null) ? `${pressureHpa} hPa` : '-- hPa');
        safeSetHTML('humidityVal', (humidityRaw !== null) ? `${humidityRaw}%` : '--%');

        // Dew point
        if (dewPoint !== null) {
          safeSetHTML('dewPointSub', `Dew: ${formatTemp(dewPoint)}°C`);
          safeSetHTML('dewPointVal', `${formatTemp(dewPoint)}°C`);
        } else {
          safeSetHTML('dewPointSub', `Dew: --°`);
          safeSetHTML('dewPointVal', '--°C');
        }
        
        // Rain prediction
        let finalRainLabel = rainLabelRaw;
        let finalConfidence = rainConfidence;
        if (rainLabelRaw === "No rain (0%)" || (rainConfidence === 0 && !rainLabelRaw.includes("rain"))) {
          finalRainLabel = "No rain";
          finalConfidence = 0;
        }
        safeSetHTML('rainPercentDisplay', `${finalConfidence}%`);
        updateRainTags(finalRainLabel, finalConfidence);
        
        // Footer message with trend info
        let trendEmoji = trendDisplay.arrow || '→';
        safeSetHTML('systemMessage', `✅ Rain monitoring active • ${data.isRaining ? '🌧️ RAINING NOW' : '☀️ NO RAIN'} • Pressure: ${trendEmoji} ${trendDisplay.direction} • Updates every 2s`);
      })
      .catch(error => {
        console.warn("Fetch error", error);
        safeSetHTML('liveTimestamp', '⚠️ connection lost');
        safeSetHTML('systemMessage', '⚠️ Failed to fetch sensor data. Retrying...');
      });
  }
  
  // Initial call and interval (2 seconds)
  refreshDashboard();
  setInterval(refreshDashboard, 2000);
</script>
</body>
</html>
